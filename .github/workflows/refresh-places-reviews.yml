name: Refresh Google Reviews
on:
  schedule:
    - cron: '0 2 1,15 * *'   # 2 AM UTC on the 1st and 15th of every month
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Refresh Places cache
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: npm run fetch-places

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/places-cache.json
          git commit -m "Auto-refresh Google reviews cache - $(date +'%Y-%m-%d')" || echo "No changes"
          git push
